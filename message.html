<!DOCTYPE html>

<title>Flight Route — Tokyo to Singapore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#01060f;
  font-family:'Barlow', sans-serif;
}

canvas {
  position:fixed; top:0; left:0;
  display:block;
}

.ui {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}

/* ---- HEADER ---- */
.header {
  position:absolute;
  top:calc(env(safe-area-inset-top, 0px) + 28px);
  left:24px;
  opacity:0;
  transition:opacity 0.3s ease;
}
.label-small {
  font-family:'Cormorant Garamond', serif;
  font-size:11px; font-weight:300; font-style:italic;
  letter-spacing:5px; color:#c8a96e;
  text-transform:uppercase;
}
.route-code {
  font-family:'Barlow Condensed', sans-serif;
  font-size:clamp(38px, 12vw, 88px); font-weight:700;
  color:#fff; letter-spacing:3px;
  line-height:0.9; margin-top:4px;
}


/* Vignette */
.vignette {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse 85% 75% at 60% 40%,
    transparent 20%, rgba(1,6,15,0.45) 75%, rgba(1,6,15,0.75) 100%);
}
.edge-l {
  position:absolute; top:0; left:0; width:12%; height:100%;
  background:linear-gradient(to right, rgba(1,6,15,0.65), transparent);
}
.edge-r {
  position:absolute; top:0; right:0; width:12%; height:100%;
  background:linear-gradient(to left, rgba(1,6,15,0.65), transparent);
}
.edge-t {
  position:absolute; top:0; left:0; right:0; height:12%;
  background:linear-gradient(to bottom, rgba(1,6,15,0.6), transparent);
}

/* ============================================================
   SCENE 3 — QUIZ
============================================================ */
.scene3 {
  position:fixed; top:0; left:0; width:100%; height:100%;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  opacity:0; pointer-events:none;
  padding:calc(env(safe-area-inset-top,0px) + 36px) 20px calc(env(safe-area-inset-bottom,0px) + 52px);
}
.scene3.active { pointer-events:auto; }

.q-card {
  margin-bottom:18px;
  padding:18px 16px 16px;
  background:rgba(1,8,22,0.78);
  border:1px solid rgba(200,169,110,0.18);
  border-radius:14px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:border-color 0.5s;
}
.q-card.solved { border-color:rgba(200,169,110,0.5); }
.q-num {
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:400; letter-spacing:5px;
  color:#c8a96e; text-transform:uppercase; margin-bottom:8px;
}
.q-text {
  font-family:'Barlow',sans-serif;
  font-size:13.5px; font-weight:300; line-height:1.75;
  color:rgba(255,255,255,0.82); margin-bottom:14px;
}
.q-hint {
  font-size:11px; color:rgba(200,169,110,0.65);
  margin-left:4px; font-style:italic;
}
.q-boxes { display:flex; flex-wrap:nowrap; gap:5px; }
.q-box {
  position:relative;
  flex:1 1 0; max-width:40px; height:40px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  transition:border-color 0.2s, background 0.2s;
  cursor:text;
}
.q-box.active-box {
  border-color:#c8a96e;
  background:rgba(200,169,110,0.1);
}
.q-box.key-box { border-color:rgba(200,169,110,0.45); }
.q-char {
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:400;
  color:#fff;
}
.q-box.composing-box .q-char { display:none; }
.q-box.composing-box::after {
  content:'|';
  color:#c8a96e;
  font-size:20px;
  animation:cursor-blink 0.65s ease-in-out infinite;
}
@keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
.q-box .key-num {
  position:absolute; top:2px; left:3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:700; color:#c8a96e;
  pointer-events:none; line-height:1; z-index:1;
}
.q-card.solved .q-box {
  background:rgba(200,169,110,0.1);
  border-color:rgba(200,169,110,0.38);
}
.q-card.solved .q-char { color:#c8a96e; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-7px)} 30%{transform:translateX(7px)}
  45%{transform:translateX(-5px)} 60%{transform:translateX(5px)}
  75%{transform:translateX(-3px)} 90%{transform:translateX(3px)}
}
.q-boxes.shaking { animation:shake 0.45s ease; }

/* ============================================================
   SCENE 3 — SLIDESHOW
============================================================ */
.slideshow {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
}
.slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0; will-change:transform, opacity; overflow:hidden;
}
.slide::after {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse 90% 85% at 50% 50%,
    transparent 25%, rgba(1,6,15,0.5) 100%);
}
@keyframes kb0 {
  from { transform:scale(1.10) translate(2%, 1%); }
  to   { transform:scale(1.00) translate(0%,  0%); }
}
@keyframes kb1 {
  from { transform:scale(1.00) translate( 0%,  0%); }
  to   { transform:scale(1.10) translate(-2%, -1%); }
}
@keyframes kb2 {
  from { transform:scale(1.06) translate(-1%,  1%); }
  to   { transform:scale(1.13) translate( 1%, -1%); }
}
#sl-0.kb { animation:kb0 5s linear both; }
#sl-1.kb { animation:kb1 5s linear both; }
#sl-2.kb { animation:kb2 5s linear both; }

  padding:24px 16px 22px;
  background:rgba(1,8,22,0.78);

  border-radius:14px;

let MBS_DATA = null;

function initDimensions() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  S = W / 390; // scale factor: 1 = iPhone base width
  generateStars();
  MBS_DATA = null; // recompute on resize
}

function generateStars() {
  const count = Math.round(120 + 80 * S);
  STARS = Array.from({length: count}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * 0.25 + 0.05
  }));
}

initDimensions();
window.addEventListener('resize', initDimensions);

/* ============================================================
   MAP PROJECTION — portrait-optimised viewport
   lon: 94–148°E, lat: -12–52°N
============================================================ */
const V = { lon0:94, lon1:148, lat0:-12, lat1:52 };

function geo(lon, lat) {
  const xN = (lon - V.lon0) / (V.lon1 - V.lon0);
  const latR  = lat  * Math.PI / 180;
  const lat0R = V.lat0 * Math.PI / 180;
  const lat1R = V.lat1 * Math.PI / 180;
  const yN = 1 - (
    Math.log(Math.tan(Math.PI/4 + latR/2))  - Math.log(Math.tan(Math.PI/4 + lat0R/2))
  ) / (
    Math.log(Math.tan(Math.PI/4 + lat1R/2)) - Math.log(Math.tan(Math.PI/4 + lat0R/2))
  );
  return [xN * W, yN * H];
}

/* ============================================================
   KEY POSITIONS (recalculated each frame against current W,H)
============================================================ */
function getPos() {
  return {
    TOKYO: geo(139.7, 35.7),
    SIN:   geo(103.8, 1.35),
    CP:    geo(127.5, 20)   // Bezier control — Philippine Sea arc
  };
}

/* ============================================================
   BEZIER
============================================================ */
function bezier(t, P) {
  const [x0,y0]=P.TOKYO, [x1,y1]=P.CP, [x2,y2]=P.SIN;
  return [
    (1-t)*(1-t)*x0 + 2*(1-t)*t*x1 + t*t*x2,
    (1-t)*(1-t)*y0 + 2*(1-t)*t*y1 + t*t*y2
  ];
}
function bezierAngle(t, P) {
  const [x0,y0]=P.TOKYO, [x1,y1]=P.CP, [x2,y2]=P.SIN;
  const dx = 2*(1-t)*(x1-x0) + 2*t*(x2-x1);
  const dy = 2*(1-t)*(y1-y0) + 2*t*(y2-y1);
  return Math.atan2(dy, dx);
}

/* ============================================================
   DRAW HELPERS
============================================================ */
function polygon(coords, fill, stroke, sw) {
  if (!coords || coords.length < 2) return;
  ctx.beginPath();
  const [sx,sy] = geo(coords[0][0], coords[0][1]);
  ctx.moveTo(sx, sy);
  for (let i=1; i<coords.length; i++) {
    const [x,y] = geo(coords[i][0], coords[i][1]);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke(); }
}

function drawBackground() {
  const bg = ctx.createRadialGradient(W*0.55, H*0.38, 0, W*0.55, H*0.38, Math.max(W,H));
  bg.addColorStop(0, '#041830');
  bg.addColorStop(0.45, '#020e1e');
  bg.addColorStop(1, '#010610');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  STARS.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,215,255,${s.a})`;
    ctx.fill();
  });
}

function drawGrid(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.7;
  for (let lat=-10; lat<=50; lat+=10) {
    const [,y] = geo(V.lon0, lat);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y);
    ctx.strokeStyle = 'rgba(40,100,180,0.2)';
    ctx.lineWidth = 0.5*S; ctx.stroke();
  }
  for (let lon=100; lon<=145; lon+=10) {
    const [x] = geo(lon, 0);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H);
    ctx.strokeStyle = 'rgba(40,100,180,0.2)';
    ctx.lineWidth = 0.5*S; ctx.stroke();
  }
  ctx.font = `500 ${Math.round(10*S)}px Barlow Condensed`;
  ctx.fillStyle = 'rgba(80,140,210,0.3)';
  for (let lon=100; lon<=145; lon+=10) {
    const [x,y] = geo(lon, V.lat0+2);
    ctx.textAlign='center'; ctx.fillText(lon+'°E', x, y);
  }
  for (let lat=0; lat<=40; lat+=10) {
    const [x,y] = geo(V.lon0+2, lat);
    ctx.textAlign='left'; ctx.fillText(lat+'°N', x, y);
  }
  ctx.restore();
}

function drawLands(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  LANDS.forEach(L => polygon(L.d, '#0b1f36', '#1e4060', 0.8*S));
  ctx.restore();
}

function drawCityPulse(x, y, t) {
  const r = (10 + (t%1)*28)*S;
  const a = 1 - (t%1);
  const grd = ctx.createRadialGradient(x,y,r*0.5,x,y,r);
  grd.addColorStop(0, `rgba(200,169,110,${a*0.5})`);
  grd.addColorStop(1, 'rgba(200,169,110,0)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();
}

function drawCityMarker(x, y, label, code, side, alpha, t) {
  ctx.save();
  ctx.globalAlpha = alpha;

  const hr = 32*S;
  const halo = ctx.createRadialGradient(x,y,0,x,y,hr);
  halo.addColorStop(0,'rgba(200,169,110,0.35)');
  halo.addColorStop(0.6,'rgba(200,169,110,0.08)');
  halo.addColorStop(1,'rgba(200,169,110,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(x,y,hr,0,Math.PI*2); ctx.fill();

  drawCityPulse(x, y, t*0.5);
  drawCityPulse(x, y, t*0.5+0.5);

  ctx.beginPath(); ctx.arc(x,y,7*S,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,169,110,0.6)'; ctx.lineWidth=1.2*S; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,3.5*S,0,Math.PI*2);
  ctx.fillStyle='#c8a96e'; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,1.8*S,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  const lx = side==='left' ? x-14*S : x+14*S;
  ctx.textAlign = side==='left' ? 'right' : 'left';
  ctx.font = `700 ${Math.round(24*S)}px Barlow Condensed`;
  ctx.fillStyle='#fff';
  ctx.fillText(code, lx, y-3*S);
  ctx.font = `300 ${Math.round(12*S)}px Barlow`;
  ctx.fillStyle='rgba(200,169,110,0.85)';
  ctx.fillText(label, lx, y+13*S);

  ctx.restore();
}

function drawPath(progress, alpha, P) {
  if (alpha<=0 || progress<=0) return;
  ctx.save(); ctx.globalAlpha=alpha;
  const N=60, drawCount=Math.floor(progress*N);
  for (let i=0; i<drawCount; i++) {
    const t0=i/N, t1=Math.min((i+0.55)/N, progress);
    if (t1<=t0) continue;
    const [x0,y0]=bezier(t0,P), [x1,y1]=bezier(t1,P);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
    ctx.strokeStyle=`rgba(200,169,110,${0.35+0.2*(i/drawCount)})`;
    ctx.lineWidth=1.8*S; ctx.stroke();
  }
  const fadeStart=Math.max(0,progress-0.15);
  for (let j=0; j<18; j++) {
    const ft=fadeStart+(progress-fadeStart)*(j/18);
    const [fx,fy]=bezier(ft,P);
    ctx.beginPath(); ctx.arc(fx,fy,2.2*S,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,215,100,${(j/18)*0.5})`; ctx.fill();
  }
  ctx.restore();
}

const trail=[];

function drawTrail() {
  for (let i=0; i<trail.length; i++) {
    const [tx,ty]=trail[i];
    const prog=i/trail.length;
    ctx.beginPath(); ctx.arc(tx,ty,prog*3.5*S,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,210,80,${prog*prog*0.55})`; ctx.fill();
  }
}

function drawPlane(x, y, angle, alpha) {
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y); ctx.rotate(angle); ctx.scale(S,S);

  const g=ctx.createRadialGradient(0,0,0,0,0,28);
  g.addColorStop(0,'rgba(255,245,220,0.5)');
  g.addColorStop(0.4,'rgba(200,220,255,0.15)');
  g.addColorStop(1,'rgba(200,220,255,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fill();

  ctx.shadowColor='rgba(255,200,80,0.6)'; ctx.shadowBlur=14;
  ctx.fillStyle='#fff';

  ctx.beginPath(); ctx.ellipse(0,0,18,4.5,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-6,-18); ctx.lineTo(-11,-13); ctx.lineTo(5,0);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-6,18);  ctx.lineTo(-11,13);  ctx.lineTo(5,0);
  ctx.closePath(); ctx.fill();

  ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(21,-1.5); ctx.lineTo(21,1.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(-21,-7); ctx.lineTo(-13,-3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(-21,7);  ctx.lineTo(-13,3);  ctx.closePath(); ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawProgressBar(t, alpha) {
  if (alpha<=0||t<=0) return;
  ctx.save(); ctx.globalAlpha=alpha;

  const bw=W*0.62, bh=2*S;
  const bx=(W-bw)/2, by=H-44*S;

  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,bh/2); ctx.fill();

  const fw=bw*Math.min(t,1);
  if (fw>0) {
    const gr=ctx.createLinearGradient(bx,0,bx+fw,0);
    gr.addColorStop(0,'rgba(200,169,110,0.5)');
    gr.addColorStop(1,'rgba(255,220,100,1)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.roundRect(bx,by,fw,bh,bh/2); ctx.fill();
  }
  if (t<1&&fw>0) {
    const dotX=bx+fw;
    const dg=ctx.createRadialGradient(dotX,by+bh/2,0,dotX,by+bh/2,7*S);
    dg.addColorStop(0,'rgba(255,225,100,0.9)');
    dg.addColorStop(1,'rgba(255,225,100,0)');
    ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(dotX,by+bh/2,7*S,0,Math.PI*2); ctx.fill();
  }
  ctx.font=`400 ${Math.round(10*S)}px Barlow Condensed`;
  ctx.fillStyle='rgba(200,169,110,0.6)';
  ctx.textAlign='center';
  ctx.fillText(Math.round(t*100)+'%', bx+bw/2, by-7*S);

  ctx.restore();
}

/* ============================================================
   EASING
============================================================ */
function easeOutCubic(t)    { return 1 - Math.pow(1-t,3); }
function easeInOutCubic(t)  { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

/* ============================================================
   SCENE 3 — DATA
============================================================ */
const ANSWERS = [
  'にこらいばーぐまん', // Q1 (9)
  'ぺきんだっく', // Q2 (6)
  'ぴのぽむ',           // Q3 (4)
  'ないとうけいすけ',   // Q4 (8)
  'ゆかだんぼう',       // Q5 (6)
];
// [qIdx, charIdx(0-based), finalBoxIdx(0-based)]
const KEY_MAP = [
  [0, 4, 0], [0, 6, 2],
  [1, 4, 1],
  [2, 1, 3],
  [3, 1, 5],
  [4, 0, 4],
];
const solved = [false,false,false,false,false];

/* ============================================================
   MARINA BAY BACKGROUND — 実写画像版
============================================================ */
const bgImg = document.getElementById('bg-img');

function drawMBSBackground(t) {
  // cover-fit で画像を描画
  if (bgImg.naturalWidth > 0) {
    const scale = Math.max(W / bgImg.naturalWidth, H / bgImg.naturalHeight);
    const dw = bgImg.naturalWidth * scale;
    const dh = bgImg.naturalHeight * scale;
    ctx.drawImage(bgImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#01080f';
    ctx.fillRect(0, 0, W, H);
  }

  // 暗めのオーバーレイ（クイズカードを読みやすく）
  const overlay = ctx.createLinearGradient(0, 0, 0, H);
  overlay.addColorStop(0,   'rgba(1,6,18,0.52)');
  overlay.addColorStop(0.5, 'rgba(1,6,18,0.38)');
  overlay.addColorStop(1,   'rgba(1,6,18,0.65)');
  ctx.fillStyle = overlay;
  ctx.fillRect(0, 0, W, H);

  // 星のきらめき（空部分に薄く重ねる）
  STARS.forEach(s => {
    if (s.y > H * 0.44) return;
    const tw = 0.7 + 0.3 * Math.sin(t * 0.0008 * (s.r + 0.5));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 0.75, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${s.a * tw * 0.55})`;
    ctx.fill();
  });

  // ビネット（周辺減光）
  const vig = ctx.createRadialGradient(W * 0.5, H * 0.4, H * 0.05, W * 0.5, H * 0.4, H * 0.95);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(0.55,'rgba(1,6,15,0.08)');
  vig.addColorStop(1,   'rgba(1,6,15,0.72)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

/* ============================================================
   QUIZ LOGIC
============================================================ */
let scene4Initialized = false;

function initScene4() {
  if (scene4Initialized) return;
  scene4Initialized = true;

  ANSWERS.forEach((answer, qIdx) => {
    cursors[qIdx] = 0;
    const container = document.getElementById(`qboxes-${qIdx}`);
    const card = document.getElementById(`qcard-${qIdx}`);
    const chars = [...answer];
    const hint = document.createElement('span');
    hint.className = 'q-hint';
    hint.textContent = `（ひらがな${chars.length}文字）`;
    card.querySelector('.q-text').appendChild(hint);
    const keyPos = KEY_MAP
      .filter(k => k[0]===qIdx)
      .reduce((m,[,ci,fi]) => { m[ci]=fi+1; return m; }, {});

    chars.forEach((_, ci) => {
      const box = document.createElement('div');
      box.className = 'q-box' + (keyPos[ci] ? ' key-box' : '');
      if (keyPos[ci]) {
        const num = document.createElement('span');
        num.className = 'key-num';
        num.textContent = keyPos[ci];
        box.appendChild(num);
      }
      const charSpan = document.createElement('span');
      charSpan.className = 'q-char';
      box.appendChild(charSpan);
      container.appendChild(box);
    });

    // 各問に1つの隠しinput
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.id = `q-inp-${qIdx}`;
    inp.autocomplete = 'off'; inp.autocorrect = 'off';
    inp.autocapitalize = 'none'; inp.spellcheck = false;
    inp.setAttribute('inputmode', 'hiragana');
    inp.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;border:none;outline:none;';
    document.body.appendChild(inp);

    card.addEventListener('click', () => inp.focus());

    let composing = false;

    function processChars(text) {
      for (const ch of [...text]) {
        if (cursors[qIdx] >= chars.length) break;
        const span = getCharSpan(qIdx, cursors[qIdx]);
        if (span) span.textContent = ch;
        cursors[qIdx]++;
      }
      updateCursor(qIdx);
      if (cursors[qIdx] >= chars.length) checkAnswer(qIdx);
    }

    inp.addEventListener('compositionstart', () => {
      composing = true;
      getCharSpan(qIdx, cursors[qIdx])?.closest('.q-box')?.classList.add('composing-box');
    });
    inp.addEventListener('compositionend', () => {
      composing = false;
      getCharSpan(qIdx, cursors[qIdx])?.closest('.q-box')?.classList.remove('composing-box');
      const text = inp.value;
      inp.value = '';
      if (text) processChars(text);
    });
    inp.addEventListener('input', () => {
      if (composing) return;
      const text = inp.value;
      inp.value = '';
      if (text) processChars(text);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !composing && cursors[qIdx] > 0) {
        cursors[qIdx]--;
        const span = getCharSpan(qIdx, cursors[qIdx]);
        if (span) span.textContent = '';
        updateCursor(qIdx);
      }
    });
    inp.addEventListener('focus', () => updateCursor(qIdx));
    inp.addEventListener('blur',  () => {
      container.querySelectorAll('.q-box').forEach(b => b.classList.remove('active-box'));
    });

    updateCursor(qIdx);
  });
  setTimeout(() => document.getElementById('q-inp-0')?.focus(), 200);
}

const cursors = [];

function getCharSpan(qIdx, ci) {
  return document.querySelector(`#qboxes-${qIdx} .q-box:nth-child(${ci+1}) .q-char`);
}

function updateCursor(qIdx) {
  const container = document.getElementById(`qboxes-${qIdx}`);
  if (!container) return;
  container.querySelectorAll('.q-box').forEach((box, i) => {
    box.classList.toggle('active-box', i === cursors[qIdx] && !solved[qIdx]);
  });
}

function checkAnswer(qIdx) {
  setTimeout(() => {
    const chars = [...ANSWERS[qIdx]];
    const spans = document.querySelectorAll(`#qboxes-${qIdx} .q-char`);
    const entered = [...spans].map(s => s.textContent).join('');
    if (entered.length < chars.length) return;
    if (entered === ANSWERS[qIdx]) solveQuestion(qIdx);
    else shakeQuestion(qIdx);
  }, 60);
}

function solveQuestion(qIdx) {
  solved[qIdx] = true;
  document.getElementById(`qcard-${qIdx}`).classList.add('solved');
  document.getElementById(`qboxes-${qIdx}`)
    ?.querySelectorAll('.q-box').forEach(b => b.classList.remove('active-box'));

  const next = solved.findIndex((s,i) => i>qIdx && !s);
  if (next>=0) setTimeout(() => document.getElementById(`q-inp-${next}`)?.focus(), 350);
}

function shakeQuestion(qIdx) {
  const boxes = document.getElementById(`qboxes-${qIdx}`);
  boxes.classList.remove('shaking');
  void boxes.offsetWidth;
  boxes.classList.add('shaking');
  setTimeout(() => {
    boxes.classList.remove('shaking');
    boxes.querySelectorAll('.q-char').forEach(s => s.textContent = '');
    cursors[qIdx] = 0;
    updateCursor(qIdx);
    document.getElementById(`q-inp-${qIdx}`)?.focus();
  }, 450);
}

/* ============================================================
   SCENE 3 — SLIDESHOW
============================================================ */
const SLIDE_STARTS  = [0, 4000, 8000]; // 各スライドの開始時刻(ms)
const CROSS_DUR     = 800;             // クロスフェード時間(ms)
const SCENE3_DUR    = 13000;           // Scene3合計時間(ms)

function renderScene3(e) {
  // Canvas: 暗い下地
  ctx.fillStyle = '#01060f';
  ctx.fillRect(0, 0, W, H);

  // Scene2のホワイトアウトから繋ぎ（冒頭800msで白が消える）
  const introWhite = Math.max(0, 1 - e / CROSS_DUR);
  if (introWhite > 0) {
    ctx.fillStyle = `rgba(255,255,255,${introWhite})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 各スライドの不透明度を制御
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`sl-${i}`);
    const t0 = SLIDE_STARTS[i];
    const fadeIn = Math.min(1, Math.max(0, (e - t0) / CROSS_DUR));
    let fadeOut;
    if (i < 2) {
      // 次スライドが始まる頃にフェードアウト
      fadeOut = Math.min(1, Math.max(0, (SLIDE_STARTS[i + 1] + CROSS_DUR - e) / CROSS_DUR));
    } else {
      // 最終スライドはScene3終了前に暗転
      fadeOut = 1 - Math.min(1, Math.max(0, (e - (SCENE3_DUR - CROSS_DUR - 200)) / CROSS_DUR));
    }
    const alpha = fadeIn * fadeOut;
    el.style.opacity = alpha;
    // Ken Burns: 初めて表示されるタイミングでクラス付与
    if (alpha > 0 && !el.classList.contains('kb')) el.classList.add('kb');
  }
}

   SCENE 4 — QUIZ (旧Scene3)
============================================================ */
function renderScene4(e) {
  initScene4();
  const fadeIn = Math.min(1, e/1200);
  drawMBSBackground(e);
  if (fadeIn < 1) {
    ctx.fillStyle=`rgba(255,255,255,${1-fadeIn})`;
    ctx.fillRect(0,0,W,H);
  }
  const s3 = document.getElementById('scene3');
  s3.style.opacity = Math.max(0, (fadeIn-0.5)*2);
  if (fadeIn>0.5 && !s3.classList.contains('active')) s3.classList.add('active');
}

/* ============================================================
   SCENE 1 — Flight animation (15 s, plays once)
============================================================ */
const SCENE1_DUR = 15000;

function renderScene1(e, ts) {
  const P = getPos();

  const mapAlpha  = Math.min(1, e/1800);
  const landAlpha = Math.min(1, Math.max(0,(e-1800)/1400));
  const cityAlpha = Math.min(1, Math.max(0,(e-3200)/1200));
  const pathProg  = easeOutCubic(Math.min(1, Math.max(0,(e-4400)/3100)));
  const planeT    = e>7500 ? easeInOutCubic(Math.min(1,(e-7500)/7000)) : 0;
  const planeAlpha= Math.min(1, Math.max(0,(e-7500)/600));

  if (e>7500 && planeT<1) {
    trail.push(bezier(planeT, P));
    if (trail.length>70) trail.shift();
  } else if (e<=7500) {
    trail.length=0;
  }

  drawBackground();
  drawStars();
  drawGrid(mapAlpha);
  drawLands(landAlpha);
  drawPath(pathProg, cityAlpha, P);
  drawTrail();
  drawCityMarker(P.TOKYO[0],P.TOKYO[1],'Tokyo','HND','left', cityAlpha, ts/1000);
  drawCityMarker(P.SIN[0],  P.SIN[1],  'Singapore','SIN','right', cityAlpha, ts/1000+0.3);
  if (e>7500) {
    const [px,py]=bezier(planeT,P);
    drawPlane(px,py,bezierAngle(planeT,P),planeAlpha);
  }

  document.getElementById('hdr').style.opacity = cityAlpha;
}

/* ============================================================
   SCENE 2 — Zoom into Singapore → glow → white out
   Timeline (ms from scene start):
     0–600   : brief hold, Scene-1 elements fade out
     600–6500: zoom in (1× → 100×), Singapore drifts to center
     4500–7200: warm glow builds
     6800–9000: white out
============================================================ */
function renderScene2(e, ts) {
  const P   = getPos();
  const [sx, sy] = P.SIN;

  // Scene-1 残像フェードアウト (600ms)
  const transAlpha = Math.max(0, 1 - e/1200);

  // ズーム
  const zoomProg = easeInOutCubic(Math.min(1, Math.max(0, (e-1200)/11200)));
  const zoom     = 1 + zoomProg * 99; // 1× → 100×

  // シンガポールのスクリーン位置：自然位置 → 画面中央へ
  const cx = sx + zoomProg * (W/2 - sx);
  const cy = sy + zoomProg * (H/2 - sy);

  // --- 背景・星（ズーム外）---
  drawBackground();
  drawStars();

  // --- ズームイン描画 ---
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(zoom, zoom);
  ctx.translate(-sx, -sy);

  const gridAlpha = Math.max(0, 1 - zoomProg*3);
  if (gridAlpha > 0) drawGrid(gridAlpha);
  drawLands(1);

  ctx.restore();

  // --- Scene-1 残像（ルート・マーカー・ヘッダー）フェードアウト ---
  if (transAlpha > 0) {
    drawPath(1, transAlpha, P);
    drawCityMarker(P.TOKYO[0],P.TOKYO[1],'Tokyo','HND','left', transAlpha, ts/1000);
    drawCityMarker(P.SIN[0],  P.SIN[1],  'Singapore','SIN','right', transAlpha, ts/1000+0.3);
    document.getElementById('hdr').style.opacity = transAlpha;
  } else {
    document.getElementById('hdr').style.opacity = 0;
  }

  // --- グロー → ホワイトアウト（一体化）---
  // 600ms から 2400ms かけて gold → white へ昇華、18.0s に完了
  const brightProg = easeInOutCubic(Math.min(1, Math.max(0, (e-1200)/3300)));
  if (brightProg > 0) {
    // 中心から広がる温かい光（gold → white）
    const g1 = ctx.createRadialGradient(cx,cy,0, cx,cy, W*(0.15 + brightProg*1.2));
    g1.addColorStop(0,   `rgba(255,255,255,${Math.min(1, brightProg*1.5)})`);
    g1.addColorStop(0.3, `rgba(255,220,140,${brightProg*0.85})`);
    g1.addColorStop(0.7, `rgba(255,200,80,${brightProg*0.4})`);
    g1.addColorStop(1,   'rgba(255,200,80,0)');
    ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);

    // 外側の温かいヘイズ
    const g2 = ctx.createRadialGradient(cx,cy,0, cx,cy, W*2);
    g2.addColorStop(0, `rgba(255,240,180,${brightProg*0.5})`);
    g2.addColorStop(1, 'rgba(255,240,180,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);

    // 最初から段階的に白が広がる（16.2s → 21.0s で完全白）
    ctx.fillStyle = `rgba(255,255,255,${Math.pow(brightProg, 0.4)})`;
    ctx.fillRect(0,0,W,H);
  }
}

/* ============================================================
   RENDER LOOP
============================================================ */
const SCENE2_DUR = 4500; // white-out completes at scene2_e=4500ms
// SCENE3_DUR is defined above in the slideshow section
let start=null;

function render(ts) {
  if (!start) start=ts;
  const elapsed = ts - start;

  ctx.save();
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);

  if (elapsed < SCENE1_DUR) {
    renderScene1(elapsed, ts);
  } else if (elapsed < SCENE1_DUR + SCENE2_DUR) {
    renderScene2(elapsed - SCENE1_DUR, ts);
  } else if (elapsed < SCENE1_DUR + SCENE2_DUR + SCENE3_DUR) {
    renderScene3(elapsed - SCENE1_DUR - SCENE2_DUR);
  } else {
    renderScene4(elapsed - SCENE1_DUR - SCENE2_DUR - SCENE3_DUR);
  }

  ctx.restore();
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
