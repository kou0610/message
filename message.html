============================================================ */

function geo(lon, lat) {
  // Simple equirectangular with slight mercator correction
  const xN = (lon - V.lon0) / (V.lon1 - V.lon0);
  const latR = lat * Math.PI / 180;
  const lat0R = V.lat0 * Math.PI / 180;
  const lat1R = V.lat1 * Math.PI / 180;
  const yN = 1 - (Math.log(Math.tan(Math.PI/4 + latR/2)) - Math.log(Math.tan(Math.PI/4 + lat0R/2)))
               / (Math.log(Math.tan(Math.PI/4 + lat1R/2)) - Math.log(Math.tan(Math.PI/4 + lat0R/2)));
  return [xN * W, yN * H];
}

/* ============================================================
   KEY POSITIONS
============================================================ */
const TOKYO = geo(139.7, 35.7);
const SIN   = geo(103.8, 1.35);
const CP    = geo(127.5, 20);   // Bezier control point (Philippine Sea arc)

/* ============================================================
   BEZIER HELPERS
============================================================ */
function bezier(t) {
  const [x0,y0]=TOKYO, [x1,y1]=CP, [x2,y2]=SIN;
  return [
    (1-t)*(1-t)*x0 + 2*(1-t)*t*x1 + t*t*x2,
    (1-t)*(1-t)*y0 + 2*(1-t)*t*y1 + t*t*y2
  ];
}
function bezierAngle(t) {
  const [x0,y0]=TOKYO, [x1,y1]=CP, [x2,y2]=SIN;
  const dx = 2*(1-t)*(x1-x0) + 2*t*(x2-x1);
  const dy = 2*(1-t)*(y1-y0) + 2*t*(y2-y1);
  return Math.atan2(dy, dx);
}

/* ============================================================
   DRAW HELPERS
============================================================ */
function polygon(coords, fill, stroke, sw=1.5) {
  if (!coords || coords.length<2) return;
  ctx.beginPath();
  const [sx,sy] = geo(coords[0][0], coords[0][1]);
  ctx.moveTo(sx,sy);
  for (let i=1;i<coords.length;i++){
    const [x,y] = geo(coords[i][0], coords[i][1]);
    ctx.lineTo(x,y);
  }
  ctx.closePath();
  if (fill){ ctx.fillStyle=fill; ctx.fill(); }
  if (stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke(); }
}

function drawBackground() {
  // Deep space
  const bg = ctx.createRadialGradient(W*0.6, H*0.38, 0, W*0.6, H*0.38, W*0.9);
  bg.addColorStop(0, '#041830');
  bg.addColorStop(0.45, '#020e1e');
  bg.addColorStop(1, '#010610');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
}

/* Pre-generate stars */
const STARS = Array.from({length:250}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.4 + 0.2,
  a: Math.random()*0.25 + 0.05
}));

function drawStars() {
  STARS.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,215,255,${s.a})`;
    ctx.fill();
  });
}

function drawGrid(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.7;

  // Latitude lines
  for (let lat=-10; lat<=50; lat+=10) {
    const [,y] = geo(V.lon0, lat);
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.strokeStyle = 'rgba(40,100,180,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Longitude lines
  for (let lon=80; lon<=150; lon+=10) {
    const [x] = geo(lon, 0);
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.strokeStyle = 'rgba(40,100,180,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Lat/lon labels
  ctx.font = '500 13px Barlow Condensed';
  ctx.fillStyle = 'rgba(80,140,210,0.3)';
  for (let lon=90; lon<=150; lon+=10) {
    const [x,y] = geo(lon, V.lat0+1);
    ctx.textAlign = 'center';
    ctx.fillText(lon+'°E', x, y);
  }
  for (let lat=0; lat<=40; lat+=10) {
    const [x,y] = geo(V.lon0+1.5, lat);
    ctx.textAlign = 'left';
    ctx.fillText(lat+'°N', x, y);
  }
  ctx.restore();
}

function drawLands(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Ocean glow under land masses
  const oceanGlow = ctx.createRadialGradient(W*0.55, H*0.4, 0, W*0.55, H*0.4, W*0.55);
  oceanGlow.addColorStop(0, 'rgba(5,35,80,0.3)');
  oceanGlow.addColorStop(1, 'rgba(5,35,80,0)');
  ctx.fillStyle = oceanGlow;
  ctx.fillRect(0,0,W,H);

  const fill   = '#0b1f36';
  const stroke = '#1e4060';

  LANDS.forEach(L => polygon(L.d, fill, stroke, 1.2));

  ctx.restore();
}

function drawCityPulse(x, y, t) {
  // Expanding ring
  const r = 16 + (t % 1) * 40;
  const a = 1 - (t % 1);
  const grd = ctx.createRadialGradient(x,y, r*0.5, x, y, r);
  grd.addColorStop(0, `rgba(200,169,110,${a*0.5})`);
  grd.addColorStop(1, `rgba(200,169,110,0)`);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();
}

function drawCityMarker(x, y, label, code, side, alpha, t) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Halo
  const halo = ctx.createRadialGradient(x,y,0,x,y,45);
  halo.addColorStop(0,'rgba(200,169,110,0.35)');
  halo.addColorStop(0.6,'rgba(200,169,110,0.08)');
  halo.addColorStop(1,'rgba(200,169,110,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(x,y,45,0,Math.PI*2); ctx.fill();

  // Pulse rings
  drawCityPulse(x, y, t * 0.5);
  drawCityPulse(x, y, (t * 0.5 + 0.5));

  // Outer ring
  ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,169,110,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

  // Core dot
  ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
  ctx.fillStyle='#c8a96e'; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // Label line
  const lx = side==='left' ? x-22 : x+22;
  const align = side==='left' ? 'right' : 'left';
  ctx.textAlign = align;

  ctx.font = '700 36px Barlow Condensed';
  ctx.fillStyle='#fff';
  ctx.letterSpacing='3px';
  ctx.fillText(code, lx, y-6);

  ctx.font = '300 17px Barlow';
  ctx.fillStyle='rgba(200,169,110,0.85)';
  ctx.fillText(label, lx, y+16);

  ctx.restore();
}

function drawPath(progress, alpha) {
  if (alpha<=0 || progress<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const N = 80;
  const drawCount = Math.floor(progress * N);

  // Draw dashes
  for (let i=0; i<drawCount; i++) {
    const t0 = i/N;
    const t1 = Math.min((i+0.55)/N, progress);
    if (t1 <= t0) continue;
    const [x0,y0] = bezier(t0);
    const [x1,y1] = bezier(t1);
    ctx.beginPath();
    ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
    ctx.strokeStyle = `rgba(200,169,110,${0.4 + 0.2*(i/drawCount)})`;
    ctx.lineWidth = 2.2;
    ctx.stroke();
  }

  // Glow fade near current position
  const fadeLen = 0.15;
  const fadeStart = Math.max(0, progress - fadeLen);
  for (let j=0; j<24; j++) {
    const ft = fadeStart + (progress-fadeStart)*(j/24);
    const [fx,fy] = bezier(ft);
    const fa = (j/24)*0.5;
    ctx.beginPath();
    ctx.arc(fx,fy, 3.5, 0, Math.PI*2);
    ctx.fillStyle=`rgba(255,215,100,${fa})`;
    ctx.fill();
  }

  ctx.restore();
}

/* ---- TRAIL ---- */
const trail = [];

function drawTrail() {
  for (let i=0; i<trail.length; i++) {
    const [tx,ty] = trail[i];
    const prog = i / trail.length;
    const r = prog * 5;
    const a = prog * prog * 0.55;
    ctx.beginPath();
    ctx.arc(tx, ty, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,210,80,${a})`;
    ctx.fill();
  }
}

/* ---- PLANE ICON ---- */
function drawPlane(x, y, angle, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Outer glow
  const g = ctx.createRadialGradient(0,0,0,0,0,38);
  g.addColorStop(0,'rgba(255,245,220,0.5)');
  g.addColorStop(0.4,'rgba(200,220,255,0.15)');
  g.addColorStop(1,'rgba(200,220,255,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,38,0,Math.PI*2); ctx.fill();

  // Shadow under
  ctx.shadowColor='rgba(255,200,80,0.6)';
  ctx.shadowBlur=18;
  ctx.fillStyle='#fff';

  // Fuselage
  ctx.beginPath();
  ctx.ellipse(0,0,22,5.5,0,0,Math.PI*2);
  ctx.fill();

  // Wings
  ctx.beginPath();
  ctx.moveTo(3,0);
  ctx.lineTo(-7,-22);
  ctx.lineTo(-13,-16);
  ctx.lineTo(6,0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(3,0);
  ctx.lineTo(-7,22);
  ctx.lineTo(-13,16);
  ctx.lineTo(6,0);
  ctx.closePath();
  ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.moveTo(18,0); ctx.lineTo(25,-2); ctx.lineTo(25,2); ctx.closePath();
  ctx.fill();

  // Tail fins
  ctx.beginPath();
  ctx.moveTo(-19,0);ctx.lineTo(-25,-9);ctx.lineTo(-16,-4);ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-19,0);ctx.lineTo(-25,9);ctx.lineTo(-16,4);ctx.closePath();
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

/* ---- PROGRESS BAR ---- */
function drawProgressBar(t, alpha) {
  if (alpha<=0||t<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const bx = W*0.28, by = H-52, bw = W*0.44, bh = 2.5;

  // Track
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 2);
  ctx.fill();

  // Fill
  const fw = bw * Math.min(t,1);
  if (fw > 0) {
    const gr = ctx.createLinearGradient(bx,0,bx+fw,0);
    gr.addColorStop(0,'rgba(200,169,110,0.5)');
    gr.addColorStop(1,'rgba(255,220,100,1)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.roundRect(bx, by, fw, bh, 2);
    ctx.fill();
  }

  // Leading dot
  if (t < 1 && fw > 0) {
    const dotX = bx + fw;
    const dg = ctx.createRadialGradient(dotX,by+1,0,dotX,by+1,9);
    dg.addColorStop(0,'rgba(255,225,100,0.9)');
    dg.addColorStop(1,'rgba(255,225,100,0)');
    ctx.fillStyle=dg;
    ctx.beginPath();
    ctx.arc(dotX, by+1, 9, 0, Math.PI*2);
    ctx.fill();
  }

  // Percentage text
  ctx.font='400 13px Barlow Condensed';
  ctx.fillStyle='rgba(200,169,110,0.6)';
  ctx.textAlign='center';
  ctx.fillText(Math.round(t*100)+'%', bx+bw*0.5, by-10);

  ctx.restore();
}

/* ============================================================
   EASING
============================================================ */
function easeOutCubic(t) { return 1 - Math.pow(1-t,3); }
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

/* ============================================================
   ANIMATION LOOP
============================================================ */
const TOTAL = 16000; // 16s loop
let start = null;

function render(ts) {
  if (!start) start = ts;
  const e = (ts - start) % TOTAL; // loop
  const t = e / TOTAL;

  // Phases (ms into cycle):
  //  0–1800:  bg + grid fade in
  //  1800–3200: land fade in
  //  3200–4400: cities appear
  //  4400–7500: path draws
  //  7500–14500: plane flies
  //  14500–16000: fade out / restart

  const fadeOut = e > 14500 ? 1 - (e-14500)/1500 : 1;

  const mapAlpha   = Math.min(1, e/1800) * fadeOut;
  const landAlpha  = Math.min(1, Math.max(0,(e-1800)/1400)) * fadeOut;
  const cityAlpha  = Math.min(1, Math.max(0,(e-3200)/1200)) * fadeOut;
  const pathProg   = easeOutCubic(Math.min(1, Math.max(0,(e-4400)/3100)));
  const planeT     = e > 7500 ? easeInOutCubic(Math.min(1,(e-7500)/7000)) : 0;
  const planeAlpha = Math.min(1, Math.max(0,(e-7500)/600)) * fadeOut;
  const barAlpha   = Math.min(1, Math.max(0,(e-7800)/800)) * fadeOut;

  // Manage trail
  if (e > 7500 && planeT < 1) {
    const pos = bezier(planeT);
    trail.push(pos);
    if (trail.length > 90) trail.shift();
  } else if (e <= 7500 || planeT >= 1) {
    trail.length = 0;
  }

  // ---- DRAW ----
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawStars();
  drawGrid(mapAlpha);
  drawLands(landAlpha);
  drawPath(pathProg, cityAlpha);
  drawTrail();
  drawCityMarker(TOKYO[0],TOKYO[1],'Tokyo / Haneda','HND','left', cityAlpha, ts/1000);
  drawCityMarker(SIN[0], SIN[1],'Singapore','SIN','right', cityAlpha, ts/1000+0.3);

  if (e > 7500) {
    const [px,py] = bezier(planeT);
    const ang = bezierAngle(planeT);
    drawPlane(px, py, ang, planeAlpha);
  }

  drawProgressBar(planeT, barAlpha);

  // HTML UI visibility
  const uiAlpha = cityAlpha;
  document.getElementById('bar').style.opacity = barAlpha;

  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
